description.Spanish=Una mansión envuelta en una extraña niebla, un propietario que se hace llamar «El Elegido»... \nTodo lo de que un periodista puede soñar para su nuevo artículo del periódico.\n\n-----------------------------------------------------------------------\n\nEscenario inspirado en el escenario no oficial de la primera edición de Mansiones de la locura «La extraña casa en la niebla» creado por Stu Monk y adaptado originalmente a la segunda edición por Ceraludo65. Se ha revisado, corregido, ampliado (nuevos eventos, diálogos y pruebas) y traducido para que en esta nueva versión el funcionamiento del escenario siga los patrones de la segunda edición.
description.Portuguese=Uma mansão envolta em uma névoa estranha, um proprietário que se autodenomina "O Escolhido" ... Tudo o que um jornalista pode sonhar para seu novo artigo de jornal.\n\n-----------------------------------------------------------------------\n\nConjunto inspirado em um cenário não oficial da primeira edição de Mansions of Madness, criado por Stu Monk e originalmente adaptado para a segunda edição por Ceraludo65. Foi revisado, corrigido, ampliado (novos eventos, diálogos e testes) e traduzido para que nesta nova versão o funcionamento do cenário siga os padrões da segunda edição.
description.French=Un manoir enveloppé d'une étrange brume, un propriétaire qui se fait appeler «L'Élu»... Tout ce dont un journaliste peut rêver pour son prochain article.\n\n-----------------------------------------------------------------------\n\nScénario inspiré du scénario non officiel de la première édition des Demeures de l'Épouvante «La maison étrange dans la brume» créé par Stu Monk et adapté à la deuxième édition par Ceraludo65. Il a été révisé, corrigé, enrichi (nouveaux événements, dialogues et épreuves) et traduit pour que le fonctionnement de cette nouvelle version suive les standards de la deuxième édition.
